# .github/workflows/release-front.yml
name: Release Frontend

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test

  build-and-release:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      # Extract version from git tag (v7.2.0 -> 7.2.0) and inject into package.json.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Select the right electron-builder config based on the tag:
      #   v7.3.0           -> stable  -> electron-builder.json5       + VITE production
      #   v7.3.1-beta.0    -> beta    -> electron-builder.beta.json5  + VITE staging
      #
      # Les DEUX configs vivent dans le repo (plus d'inline-rewriting), ce qui
      # evite les drifts entre le config reellement publie et ce que l'app embarque.
      - name: Detect channel and select config
        shell: bash
        run: |
          if [[ "$VERSION" == *-beta.* ]]; then
            echo "BUILDER_CONFIG=electron-builder.beta.json5" >> "$GITHUB_ENV"
            echo "VITE_MODE=staging" >> "$GITHUB_ENV"
            echo "CHANNEL=beta"
          else
            echo "BUILDER_CONFIG=electron-builder.json5" >> "$GITHUB_ENV"
            echo "VITE_MODE=production" >> "$GITHUB_ENV"
            echo "CHANNEL=stable"
          fi

      - name: Build renderer and main
        run: npx tsc && npx vite build --mode ${{ env.VITE_MODE }}

      - name: Publish release
        run: npx electron-builder --config ${{ env.BUILDER_CONFIG }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
