# .github/workflows/release-front.yml
name: Release Frontend

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test

  build-and-release:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      # Extract version from git tag (v7.2.0 -> 7.2.0) and inject into package.json.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Select the right electron-builder config based on the tag:
      #   v7.3.0           -> stable  -> electron-builder.json5       + VITE production
      #   v7.3.1-beta.0    -> beta    -> electron-builder.beta.json5  + VITE staging
      #
      # Les DEUX configs vivent dans le repo (plus d'inline-rewriting), ce qui
      # evite les drifts entre le config reellement publie et ce que l'app embarque.
      - name: Detect channel and select config
        shell: bash
        run: |
          if [[ "$VERSION" == *-beta.* ]]; then
            echo "BUILDER_CONFIG=electron-builder.beta.json5" >> "$GITHUB_ENV"
            echo "VITE_MODE=staging" >> "$GITHUB_ENV"
            echo "CHANNEL=beta"
          else
            echo "BUILDER_CONFIG=electron-builder.json5" >> "$GITHUB_ENV"
            echo "VITE_MODE=production" >> "$GITHUB_ENV"
            echo "CHANNEL=stable"
          fi

      # .env.production / .env.staging are .gitignored. We rebuild the right
      # one at build time from GitHub Secrets so the Vite bundle embeds the
      # correct values per channel.
      - name: Write env file from secrets
        shell: bash
        env:
          ROOMS_URL_PROD: ${{ secrets.VITE_ROOMS_SERVER_URL_PROD }}
          ROOMS_URL_STAGING: ${{ secrets.VITE_ROOMS_SERVER_URL_STAGING }}
          APTABASE_KEY_PROD: ${{ secrets.VITE_APTABASE_APP_KEY_PROD }}
          APTABASE_KEY_STAGING: ${{ secrets.VITE_APTABASE_APP_KEY_STAGING }}
          APTABASE_HOST: ${{ secrets.VITE_APTABASE_HOST }}
        run: |
          if [[ "$VITE_MODE" == "staging" ]]; then
            ENV_FILE=".env.staging"
            ROOMS_URL="$ROOMS_URL_STAGING"
            APTABASE_KEY="$APTABASE_KEY_STAGING"
          else
            ENV_FILE=".env.production"
            ROOMS_URL="$ROOMS_URL_PROD"
            APTABASE_KEY="$APTABASE_KEY_PROD"
          fi
          {
            echo "VITE_ROOMS_SERVER_URL=$ROOMS_URL"
            echo "VITE_APTABASE_APP_KEY=$APTABASE_KEY"
            echo "VITE_APTABASE_HOST=$APTABASE_HOST"
          } > "$ENV_FILE"
          echo "Wrote $ENV_FILE (values hidden)"

      - name: Build renderer and main
        run: npx tsc && npx vite build --mode ${{ env.VITE_MODE }}

      - name: Publish release
        run: npx electron-builder --config ${{ env.BUILDER_CONFIG }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
